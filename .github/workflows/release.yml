name: Release

# Bumpy release lifecycle (split jobs so credentials stay scoped):
# - plan: read-only, decides whether to update the Version Packages PR or
#   publish (the Version Packages PR was just merged).
# - version-pr: opens/updates the Version Packages PR.
# - publish: builds, then publishes to npm via OIDC trusted publishing
#   (no NPM_TOKEN) with provenance, creates git tags + GitHub releases.
#
# Setup (one-time, documented in the README):
# - configure the npm trusted publisher for each package on npmjs.com,
#   bound to this repo, this workflow, and the `publish` environment
#   (first-ever publish of a new package still needs a token or a manual
#   `pnpm publish` — npm requires the package to exist first)
# - optional BUMPY_GH_TOKEN secret (fine-grained PAT or App token): without
#   it, CI workflows do not run on the Version Packages PR (GitHub's
#   anti-recursion rule for github.token-created PRs)
on:
  push:
    branches: [main]

concurrency:
  group: bumpy-release
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      mode: ${{ steps.plan.outputs.mode }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - id: plan
        run: pnpm exec bumpy ci plan
        env:
          GH_TOKEN: ${{ github.token }}

  version-pr:
    needs: plan
    if: needs.plan.outputs.mode == 'version-pr'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - run: pnpm exec bumpy ci release --expect-mode version-pr
        env:
          GH_TOKEN: ${{ github.token }}
          BUMPY_GH_TOKEN: ${{ secrets.BUMPY_GH_TOKEN }}

  publish:
    needs: plan
    if: needs.plan.outputs.mode == 'publish'
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - run: pnpm build
      - run: pnpm exec bumpy ci release --expect-mode publish
        env:
          GH_TOKEN: ${{ github.token }}
          BUMPY_GH_TOKEN: ${{ secrets.BUMPY_GH_TOKEN }}
