name: CI

permissions:
  contents: read

# pull_request + push:main only — a bare [push, pull_request] double-runs
# every PR commit.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # vp check = format + lint (type-aware, includes full TS typecheck) in one
  # pass, so there is no separate typecheck job. sherif lints the monorepo
  # itself (dependency consistency across packages).
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: pnpm check
      - run: pnpm exec sherif

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: pnpm test.unit

  test-browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm list playwright --depth=0 --json | jq -r '.[0].devDependencies.playwright.version')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright chromium
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-chromium

      - name: Install Playwright chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium --with-deps

      # Vitest Browser Mode runs headless automatically in CI.
      - run: pnpm test.browser
      # Growth path: when the suite gets slow, shard this job instead —
      #   strategy:
      #     matrix:
      #       shard: [1, 2, 3, 4]
      # and run: pnpm test.browser -- --shard=${{ matrix.shard }}/4

  # Build the publishable packages, then validate what would be published:
  # publint checks package.json/exports structure, attw checks how the types
  # resolve for consumers (esm-only profile — this template ships no CJS).
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: pnpm build
      - run: pnpm exec publint packages/lib
      - run: pnpm exec attw --pack packages/lib --profile esm-only

  # Optional Windows lane: uncomment to also verify the library build on
  # Windows. Keep `check` ubuntu-only — custom oxlint JS plugins (the Qwik
  # rules) have a known Windows OOM issue until oxc's allocator work lands.
  # build-windows:
  #   runs-on: windows-latest
  #   steps:
  #     - uses: actions/checkout@v6
  #     - uses: ./.github/actions/setup
  #     - run: pnpm build
  #     - run: pnpm test.unit
